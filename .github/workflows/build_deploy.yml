name: 'Build and Deploy'
on:
  pull_request:
    branches:
      - main
    types:
      - closed
  push:
    branches:
      - main
    paths:
      - 'frontends/**'

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    environment: ${{ vars.ENV_NAME }}
    steps:
      - name: 'Checkout Repo'
        uses: actions/checkout@v3

      - name: 'Setup Node.js'
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: 'Set frontend path (React)'
        if: vars.DIST_FRONTEND == 'react'
        run: echo "FRONTEND_PATH=frontends/react-app" >> $GITHUB_ENV

      - name: 'Set frontend path (Svelte)'
        if: vars.DIST_FRONTEND == 'svelte'
        run: echo "FRONTEND_PATH=frontends/svelte-app" >> $GITHUB_ENV

      - name: 'Install dependencies'
        run: npm ci
        working-directory: ./${{ env.FRONTEND_PATH }}

      - name: 'Run tests'
        run: npm test
        working-directory: ./${{ env.FRONTEND_PATH }}

      - name: 'Authenticate to Google Cloud'
        id: auth
        uses: 'google-github-actions/auth@v1'
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.SERVICE_ACCOUNT_EMAIL }}'

      - name: 'Authenticate Docker with GCloud token'
        uses: 'docker/login-action@v1'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev'

      - name: 'Build, tag and push container'
        uses: docker/build-push-action@v3
        with:
          context: './${{ env.FRONTEND_PATH }}'
          push: true
          tags: |
            ${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.SERVICE_NAME }}:${{ github.sha }}

      - name: 'Deploy to Cloud Run'
        uses: google-github-actions/deploy-cloudrun@v0
        with:
          service: ${{ vars.SERVICE_NAME }}
          region: ${{ vars.ARTIFACT_REGISTRY_REGION }}
          image: ${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.SERVICE_NAME }}:${{ github.sha }}