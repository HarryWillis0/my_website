name: 'Build and Deploy API'
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    environment: ${{ vars.ENV_NAME }}
    steps:
      - name: 'Checkout Repo'
        uses: actions/checkout@v3

      - name: 'Set backend path (Go)'
        if: vars.DIST_BACKEND == 'go'
        run: echo "BACKEND_PATH=backends/apis/go" >> $GITHUB_ENV

      - name: 'Set backend path (Node)'
        if: vars.DIST_BACKEND == 'node'
        run: echo "BACKEND_PATH=backends/servers/node" >> $GITHUB_ENV

      - name: 'Setup Go'
        if: vars.DIST_BACKEND == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: 'backends/apis/go/go.mod'

      - name: 'Run tests (Go)'
        if: vars.DIST_BACKEND == 'go'
        run: go test ./...
        working-directory: ./backends/apis/go

      - name: 'Setup Node.js'
        if: vars.DIST_BACKEND == 'node'
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: 'Install dependencies (Node)'
        if: vars.DIST_BACKEND == 'node'
        run: npm ci
        working-directory: ./backends/servers/node

      - name: 'Run tests (Node)'
        if: vars.DIST_BACKEND == 'node'
        run: npm test
        working-directory: ./backends/servers/node

      - name: 'Authenticate to Google Cloud'
        id: auth
        uses: 'google-github-actions/auth@v1'
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.SERVICE_ACCOUNT_EMAIL }}'

      - name: 'Authenticate Docker with GCloud token'
        uses: 'docker/login-action@v1'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev'

      - name: 'Build, tag and push container'
        uses: docker/build-push-action@v3
        with:
          context: './${{ env.BACKEND_PATH }}'
          push: true
          tags: |
            ${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.API_SERVICE_NAME }}:${{ github.sha }}

      - name: 'Deploy to Cloud Run'
        uses: google-github-actions/deploy-cloudrun@v0
        with:
          service: ${{ vars.API_SERVICE_NAME }}
          region: ${{ vars.ARTIFACT_REGISTRY_REGION }}
          image: ${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.API_SERVICE_NAME }}:${{ github.sha }}
